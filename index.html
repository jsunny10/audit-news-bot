<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현대캐피탈 감사실 - Audit News 아카이브</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        /* 상단 배너 영역 */
        .header-banner {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: block;
        }
        .header-banner img {
            width: 100%;
            height: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        /* 메인 컨테이너 */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            gap: 30px;
        }
        /* 왼쪽 달력 섹션 */
        .sidebar {
            flex: 1;
            min-width: 280px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .sidebar h3 {
            margin-top: 0;
            font-size: 14pt;
            color: #111;
            border-bottom: 2px solid #222;
            padding-bottom: 10px;
        }
        .date-picker {
            width: 100%;
            padding: 10px;
            font-size: 11pt;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* 오른쪽 뉴스 콘텐츠 섹션 */
        .content {
            flex: 2.5;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: 400px;
        }
        .content h2 {
            margin-top: 0;
            font-size: 18pt;
            color: #0f172a;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }
        /* 카테고리 스타일 */
        .category-box {
            margin-bottom: 35px;
        }
        .category-title {
            font-size: 13pt;
            font-weight: bold;
            color: #1e293b;
            background: #f1f5f9;
            padding: 8px 15px;
            border-left: 4px solid #38bdf8;
            margin-bottom: 15px;
        }
        /* 뉴스 항목 스타일 */
        .news-item {
            margin-bottom: 15px;
            padding-left: 5px;
        }
        .news-title {
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .news-title a {
            color: #1a0dab;
            text-decoration: none;
        }
        .news-title a:hover {
            text-decoration: underline;
        }
        .news-url {
            font-size: 9pt;
            color: #006621;
            word-break: break-all;
        }
        .no-data {
            color: #888;
            text-align: center;
            padding-top: 50px;
            font-size: 11pt;
        }
    </style>
</head>
<body>

    <!-- 상단 배너 부착 (전달해주신 IMG_4068.jpg 매핑) -->
    <div class="header-banner">
        <img src="image_news.jpg" alt="Audit News Banner">
    </div>

    <div class="container">
        <!-- 달력 선택기 -->
        <div class="sidebar">
            <h3>일자별 리포트 조회</h3>
            <input type="date" id="reportDate" class="date-picker">
        </div>

        <!-- 뉴스 출력 본문 -->
        <div class="content">
            <h2 id="viewDateTitle">날짜를 선택해 주세요</h2>
            <div id="newsContainer">
                <p class="no-data">좌측 달력에서 조회할 리포트 일자를 선택하시면 카테고리별 뉴스가 표시됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 오늘 날짜를 기본값으로 세팅
        const dateInput = document.getElementById('reportDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        // 날짜 변경 이벤트 리스너
        dateInput.addEventListener('change', (e) => {
            fetchNewsData(e.target.value);
        });

        // 데이터 로드 및 렌더링 함수
        function fetchNewsData(dateStr) {
            const titleZone = document.getElementById('viewDateTitle');
            const container = document.getElementById('newsContainer');
            
            titleZone.innerText = `📅 ${dateStr} 감사 뉴스 리포트`;
            container.innerHTML = '<p class="no-data">데이터를 불러오는 중입니다...</p>';

            // data/YYYY-MM-DD.json 파일을 비동기로 호출
            fetch(`data/${dateStr}.json`)
                .then(response => {
                    if (!response.ok) throw new Error('해당 날짜에 생성된 리포트가 없습니다.');
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ''; // 초기화
                    
                    // 카테고리별 반복 렌더링
                    for (const [category, newsList] of Object.entries(data)) {
                        if (newsList.length === 0) continue;

                        let categoryHtml = `
                            <div class="category-box">
                                <div class="category-title">${category}</div>
                        `;

                        newsList.forEach(news => {
                            categoryHtml += `
                                <div class="news-item">
                                    <div class="news-title">
                                        <a href="${news.link}" target="_blank">${news.title}</a>
                                    </div>
                                    <div class="news-url">${news.link}</div>
                                </div>
                            `;
                        });

                        categoryHtml += `</div>`;
                        container.innerHTML += categoryHtml;
                    }
                })
                .catch(error => {
                    container.innerHTML = `<p class="no-data">⚠️ ${error.message}</p>`;
                });
        }

        // 초기 화면 구동
        fetchNewsData(today);
    </script>
</body>
</html>
