name: Batch Runner - FSS & Audit Reports

  on:
    repository_dispatch:
      types: [run-batch]
    schedule:
      - cron: '0 0,8 * * *'
    workflow_dispatch:

  jobs:
    run-python-scripts:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - run: pip install -r requirements.txt
        - name: Run FSS Press Check
          env:
            EMAIL_PW: ${{ secrets.EMAIL_PW }}
            TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
          run: python fss_press_check.py
        - name: Run Audit Report
          env:
            EMAIL_PW: ${{ secrets.EMAIL_PW }}
            TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
            NAVER_ID: ${{ secrets.NAVER_ID }}
            NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          run: python audit_report.py
