  name: Audit News Report

  on:
    repository_dispatch:
      types: [run-batch]
    workflow_dispatch:

  jobs:
    run-audit-report:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: |
            pip install -r requirements.txt

        - name: Run Audit Report
          env:
            EMAIL_PW: ${{ secrets.EMAIL_PW }}
            TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
            NAVER_ID: ${{ secrets.NAVER_ID }}
            NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          run: |
            python audit_report.py
