name: Daily Audit News Report

on:
  # 비활성화: Cron-job.org 사용 (batch-runner.yml)
  # schedule:
  #   # 한국시간 오전 8시 3분 (UTC 전날 23:03)
  #   - cron: '3 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 holidays

      - name: Run Python Script
        env:
          NAVER_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          EMAIL_PW: ${{ secrets.EMAIL_PW }}
          TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
        run: python audit_report.py

      - name: Commit and Push JSON Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/**/*.json docs/data/index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add audit news data for $(date +%Y-%m-%d)"
            git push
          fi
