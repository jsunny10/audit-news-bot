name: Daily Audit News Report

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Python Script
      env:
        NAVER_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        EMAIL_PW: ${{ secrets.EMAIL_PW }}
        TARGET_EMAILS: ${{ secrets.TARGET_EMAILS }}
      run: python audit_report.py
